name: "OpenBrain MCP Server"
version: "1.0.8"
slug: "openbrain_mcp"
description: "MCP server exposing OpenBrain memory tools to AI assistants. Connects to the OpenBrain Database add-on."
arch:
  - amd64
  - aarch64
init: false
startup: services
boot: auto
hassio_api: true
hassio_role: default
ports:
  8000/tcp: 8000
options:
  mcp_access_key: "changeme"
  litellm_url: "http://192.168.1.100:4000"
  litellm_api_key: ""
  embed_model: "nomic-embed-text"
  chat_model: "deepseek-r1:8b"
  postgres_host: ""
  postgres_port: 5432
  postgres_db: "openbrain"
  postgres_user: "openbrain"
  postgres_password: "changeme"
schema:
  mcp_access_key: str
  litellm_url: str
  litellm_api_key: str?
  embed_model: str
  chat_model: str
  postgres_host: str?
  postgres_port: int
  postgres_db: str
  postgres_user: str
  postgres_password: str
