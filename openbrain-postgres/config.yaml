name: "OpenBrain Database"
version: "1.1.1"
slug: "openbrain_postgres"
description: "Private PostgreSQL + pgvector for OpenBrain. Port is not exposed to the LAN — internal hassio network only."
arch:
  - amd64
  - aarch64
init: false
startup: services
boot: auto
backup: hot
backup_pre: /usr/local/bin/backup_pre.sh
map:
  - data:rw
options:
  db_password: "changeme"
  db_name: "openbrain"
  db_user: "openbrain"
schema:
  db_password: str
  db_name: str
  db_user: str
